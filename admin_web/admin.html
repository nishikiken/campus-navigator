<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Админ Панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-icon {
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .leaderboard {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .leaderboard h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .leader-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s;
        }
        
        .leader-item:hover {
            background: #f8f9fa;
        }
        
        .leader-rank {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            width: 40px;
        }
        
        .leader-info {
            flex: 1;
        }
        
        .leader-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .leader-stats {
            font-size: 14px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Campus Navigator</h1>
            <p>Админ панель управления пользователями</p>
        </div>
        
        <div class="cards">
            <!-- Просмотр пользователя -->
            <div class="card">
                <h2><span class="card-icon">👤</span> Просмотр пользователя</h2>
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="number" id="viewUserId" placeholder="Введите ID">
                </div>
                <button class="btn btn-primary" onclick="viewUser()">Показать</button>
                <div id="viewResult" class="result"></div>
            </div>
            
            <!-- Добавить рейтинг -->
            <div class="card">
                <h2><span class="card-icon">⭐</span> Добавить рейтинг</h2>
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="number" id="ratingUserId" placeholder="Введите ID">
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <input type="number" id="ratingAmount" placeholder="Например: 100">
                </div>
                <button class="btn btn-success" onclick="addRating()">Добавить</button>
                <div id="ratingResult" class="result"></div>
            </div>
            
            <!-- Добавить токены -->
            <div class="card">
                <h2><span class="card-icon">🪙</span> Добавить токены</h2>
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="number" id="tokensUserId" placeholder="Введите ID">
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <input type="number" id="tokensAmount" placeholder="Например: 50">
                </div>
                <button class="btn btn-success" onclick="addTokens()">Добавить</button>
                <div id="tokensResult" class="result"></div>
            </div>
        </div>
        
        <!-- Таблица лидеров -->
        <div class="leaderboard">
            <h2><span class="card-icon">🏆</span> Таблица лидеров</h2>
            <button class="btn btn-primary" onclick="loadLeaderboard()" style="max-width: 200px; margin-bottom: 20px;">Обновить</button>
            <div id="leaderboardContent" class="loading">Нажмите "Обновить" для загрузки</div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://campusnavigatorapi1-g1kox8ni.b4a.run';
        
        function showResult(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'result ' + (isSuccess ? 'success' : 'error');
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }
        
        async function viewUser() {
            const userId = document.getElementById('viewUserId').value;
            if (!userId) {
                showResult('viewResult', 'Введите Telegram ID', false);
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/user/${userId}`);
                if (response.ok) {
                    const user = await response.json();
                    const message = `Имя: ${user.name}\nТокены: ${user.tokens}\nРейтинг: ${user.rating}`;
                    showResult('viewResult', message, true);
                } else {
                    showResult('viewResult', 'Пользователь не найден', false);
                }
            } catch (error) {
                showResult('viewResult', 'Ошибка: ' + error.message, false);
            }
        }
        
        async function addRating() {
            const userId = document.getElementById('ratingUserId').value;
            const amount = document.getElementById('ratingAmount').value;
            
            if (!userId || !amount) {
                showResult('ratingResult', 'Заполните все поля', false);
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/user/rating`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: parseInt(userId),
                        amount: parseInt(amount)
                    })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    showResult('ratingResult', `✅ Добавлено! Всего рейтинга: ${user.rating}`, true);
                    document.getElementById('ratingAmount').value = '';
                } else {
                    showResult('ratingResult', 'Ошибка добавления', false);
                }
            } catch (error) {
                showResult('ratingResult', 'Ошибка: ' + error.message, false);
            }
        }
        
        async function addTokens() {
            const userId = document.getElementById('tokensUserId').value;
            const amount = document.getElementById('tokensAmount').value;
            
            if (!userId || !amount) {
                showResult('tokensResult', 'Заполните все поля', false);
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/user/tokens`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: parseInt(userId),
                        amount: parseInt(amount)
                    })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    showResult('tokensResult', `✅ Добавлено! Всего токенов: ${user.tokens}`, true);
                    document.getElementById('tokensAmount').value = '';
                } else {
                    showResult('tokensResult', 'Ошибка добавления', false);
                }
            } catch (error) {
                showResult('tokensResult', 'Ошибка: ' + error.message, false);
            }
        }
        
        async function loadLeaderboard() {
            const content = document.getElementById('leaderboardContent');
            content.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/leaderboard`);
                if (response.ok) {
                    const leaders = await response.json();
                    
                    if (leaders.length === 0) {
                        content.innerHTML = '<div class="loading">Нет данных</div>';
                        return;
                    }
                    
                    content.innerHTML = leaders.map((leader, index) => {
                        const rank = index + 1;
                        let medal = '';
                        if (rank === 1) medal = '💎';
                        else if (rank === 2) medal = '🥇';
                        else if (rank === 3) medal = '🥈';
                        
                        return `
                            <div class="leader-item">
                                <div class="leader-rank">${rank} ${medal}</div>
                                <div class="leader-info">
                                    <div class="leader-name">${leader.name}</div>
                                    <div class="leader-stats">⭐ ${leader.rating} рейтинга • 🪙 ${leader.tokens} токенов</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    content.innerHTML = '<div class="loading">Ошибка загрузки</div>';
                }
            } catch (error) {
                content.innerHTML = '<div class="loading">Ошибка: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
