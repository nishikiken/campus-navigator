<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigator - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d1b4e 100%);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(120, 119, 198, 0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d1b4e 100%);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(120, 119, 198, 0.2);
        }
        .card h2 { color: #e0e0e0; font-size: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            color: #8e8ea0;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(10, 14, 39, 0.6);
            border: 1px solid rgba(120, 119, 198, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
        .btn:hover { transform: translateY(-2px); }
        .btn-full { grid-column: 1 / -1; }
        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .result.success { background: rgba(56, 239, 125, 0.1); color: #38ef7d; border: 1px solid rgba(56, 239, 125, 0.3); }
        .result.error { background: rgba(235, 51, 73, 0.1); color: #eb3349; border: 1px solid rgba(235, 51, 73, 0.3); }
        .leaderboard {
            background: linear-gradient(135deg, #1a1f3a 0%, #2d1b4e 100%);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(120, 119, 198, 0.2);
        }
        .leader-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(10, 14, 39, 0.4);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .leader-item:hover { background: rgba(10, 14, 39, 0.6); }
        .leader-rank { font-size: 20px; font-weight: bold; width: 50px; }
        .leader-info { flex: 1; margin-left: 15px; }
        .loading { text-align: center; padding: 40px; color: #8e8ea0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 CAMPUS NAVIGATOR</h1>
            <p>Admin Control Panel [Supabase]</p>
        </div>
        
        <div class="cards">
            <div class="card">
                <h2>⭐ Рейтинг</h2>
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="number" id="ratingUserId">
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <input type="number" id="ratingAmount">
                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="modifyRating('add')">+ Добавить</button>
                    <button class="btn btn-danger" onclick="modifyRating('remove')">- Убавить</button>
                </div>
                <div id="ratingResult" class="result"></div>
            </div>
            
            <div class="card">
                <h2>🪙 Токены</h2>
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="number" id="tokensUserId">
                </div>
                <div class="form-group">
                    <label>Количество</label>
                    <input type="number" id="tokensAmount">
                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="modifyTokens('add')">+ Добавить</button>
                    <button class="btn btn-danger" onclick="modifyTokens('remove')">- Убавить</button>
                </div>
                <div id="tokensResult" class="result"></div>
            </div>
        </div>
        
        <div class="leaderboard">
            <h2>🏆 Таблица лидеров</h2>
            <button class="btn btn-primary" onclick="loadLeaderboard()" style="margin-bottom: 20px;">🔄 Загрузить</button>
            <div id="leaderboardContent" class="loading">Нажмите "Загрузить"</div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://hyxyablgkjtoxcxnurkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5eHlhYmxna2p0b3hjeG51cmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxODE5NjksImV4cCI6MjA4NDc1Nzk2OX0._3HQYSymZ2ArXIN143gAiwulCL1yt7i5fiHaTd4bp5U';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function showResult(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'result ' + (isSuccess ? 'success' : 'error');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        async function modifyRating(action) {
            const userId = document.getElementById('ratingUserId').value;
            const amount = document.getElementById('ratingAmount').value;
            if (!userId || !amount) return showResult('ratingResult', '❌ Заполните все поля', false);
            
            try {
                const { data: user } = await supabase.from('users').select('rating').eq('telegram_id', userId).single();
                const finalAmount = action === 'remove' ? -Math.abs(parseInt(amount)) : Math.abs(parseInt(amount));
                const { data } = await supabase.from('users').update({ rating: user.rating + finalAmount }).eq('telegram_id', userId).select().single();
                showResult('ratingResult', `✅ ${action === 'add' ? 'Добавлено' : 'Убавлено'}! Всего: ${data.rating}`, true);
                document.getElementById('ratingAmount').value = '';
            } catch (error) {
                showResult('ratingResult', '❌ Ошибка: ' + error.message, false);
            }
        }
        
        async function modifyTokens(action) {
            const userId = document.getElementById('tokensUserId').value;
            const amount = document.getElementById('tokensAmount').value;
            if (!userId || !amount) return showResult('tokensResult', '❌ Заполните все поля', false);
            
            try {
                const { data: user } = await supabase.from('users').select('tokens').eq('telegram_id', userId).single();
                const finalAmount = action === 'remove' ? -Math.abs(parseInt(amount)) : Math.abs(parseInt(amount));
                const { data } = await supabase.from('users').update({ tokens: user.tokens + finalAmount }).eq('telegram_id', userId).select().single();
                showResult('tokensResult', `✅ ${action === 'add' ? 'Добавлено' : 'Убавлено'}! Всего: ${data.tokens}`, true);
                document.getElementById('tokensAmount').value = '';
            } catch (error) {
                showResult('tokensResult', '❌ Ошибка: ' + error.message, false);
            }
        }
        
        async function loadLeaderboard() {
            const content = document.getElementById('leaderboardContent');
            content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            
            try {
                const { data: leaders } = await supabase.from('users').select('*').order('rating', { ascending: false }).limit(50);
                if (leaders.length === 0) return content.innerHTML = '<div class="loading">📭 Нет данных</div>';
                
                content.innerHTML = leaders.map((l, i) => {
                    const rank = i + 1;
                    const medal = rank === 1 ? '💎' : rank === 2 ? '🥇' : rank === 3 ? '🥈' : '';
                    return `<div class="leader-item"><div class="leader-rank">${rank} ${medal}</div><div class="leader-info"><div>${l.name}</div><div style="font-size:13px;color:#8e8ea0">⭐ ${l.rating} • 🪙 ${l.tokens}</div></div></div>`;
                }).join('');
            } catch (error) {
                content.innerHTML = '<div class="loading">❌ Ошибка: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
